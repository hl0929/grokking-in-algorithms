<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Matrix II Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-fill { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cell-active { transform: scale(1.1); background-color: #dbeafe; border-color: #3b82f6; z-index: 10; }
        .cell-completed { background-color: #f0fdf4; border-color: #86efac; color: #166534; }
        
        .boundary-line { position: absolute; transition: all 0.5s ease; border-style: dashed; }
        
        @keyframes draw {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="bg-gray-50 p-2 m-0 font-sans text-slate-900">

    <div class="flex flex-col w-full max-w-2xl mx-auto bg-white border border-slate-100 rounded-xl shadow-md overflow-hidden mb-4">
        
        <!-- 头部 -->
        <div class="px-4 py-3 bg-indigo-700 text-white flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold uppercase tracking-wider">LeetCode 59: Spiral Matrix II</h1>
                <p class="text-[10px] text-indigo-200">四边界收缩算法演示</p>
            </div>
            <div class="flex items-center gap-2">
                <input type="number" id="n-input" value="4" min="2" max="6" class="w-12 px-1 py-0.5 text-xs text-slate-800 rounded outline-none" />
                <button id="btn-reset" class="bg-indigo-600 hover:bg-indigo-500 text-[10px] px-3 py-1 rounded transition">重置</button>
                <button id="btn-next" class="bg-white text-indigo-700 text-[10px] px-4 py-1 rounded font-bold hover:bg-indigo-50 transition">下一步</button>
            </div>
        </div>

        <div class="p-6 flex flex-col md:flex-row gap-6">
            <!-- 矩阵展示 -->
            <div class="relative flex-shrink-0 mx-auto md:mx-0" id="matrix-wrapper">
                <div id="matrix-container" class="grid gap-1 bg-slate-100 p-1 rounded-lg border-2 border-slate-200">
                    <!-- 动态生成格子 -->
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="flex-1 space-y-4">
                <!-- 边界状态 -->
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-slate-50 p-2 rounded border border-slate-100 flex flex-col items-center">
                        <span class="text-[8px] text-slate-400 uppercase">Top / Bottom</span>
                        <div class="text-xs font-mono font-bold" id="y-bounds">0 / -</div>
                    </div>
                    <div class="bg-slate-50 p-2 rounded border border-slate-100 flex flex-col items-center">
                        <span class="text-[8px] text-slate-400 uppercase">Left / Right</span>
                        <div class="text-xs font-mono font-bold" id="x-bounds">0 / -</div>
                    </div>
                </div>

                <!-- 逻辑说明 -->
                <div class="bg-indigo-50 border border-indigo-100 p-3 rounded-lg min-h-[100px]">
                    <div class="flex items-center gap-2 mb-1">
                        <div id="dir-indicator" class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                        <h2 id="logic-title" class="text-xs font-bold text-indigo-800">准备中</h2>
                    </div>
                    <p id="logic-text" class="text-[11px] text-indigo-700 leading-relaxed">设置矩阵大小并点击“下一步”开始螺旋填充。</p>
                </div>

                <!-- 进度 -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <span class="text-[9px] text-slate-400 uppercase block mb-1">当前数字 (Num)</span>
                    <div class="flex items-baseline gap-2">
                        <div id="current-num" class="text-2xl font-mono font-bold text-indigo-600">1</div>
                        <div id="total-num" class="text-xs text-slate-400 font-mono">/ 16</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="bg-slate-900 p-3 font-mono text-[11px] text-slate-400 h-24 overflow-y-auto border-t border-slate-700" id="logs">
            <div>> 等待开始...</div>
        </div>
    </div>

<script>
    let n = 4;
    let matrix = [];
    let topBound, bottomBound, leftBound, rightBound;
    let num = 1;
    let direction = 'right'; // right, down, left, up
    let i, j; // 当前坐标

    function init() {
        const inputVal = parseInt(document.getElementById('n-input').value);
        n = isNaN(inputVal) ? 4 : Math.min(Math.max(inputVal, 2), 6);
        
        matrix = Array.from({ length: n }, () => Array(n).fill(0));
        topBound = 0;
        bottomBound = n - 1;
        leftBound = 0;
        rightBound = n - 1;
        num = 1;
        direction = 'right';
        j = leftBound;
        i = topBound;

        renderMatrix();
        document.getElementById('btn-next').disabled = false;
        document.getElementById('current-num').innerText = "1";
        document.getElementById('total-num').innerText = `/ ${n*n}`;
        document.getElementById('y-bounds').innerText = `${topBound} / ${bottomBound}`;
        document.getElementById('x-bounds').innerText = `${leftBound} / ${rightBound}`;
        document.getElementById('logic-title').innerText = "已重置";
        document.getElementById('logic-text').innerText = `生成 ${n}x${n} 矩阵。将按照 上->右->下->左 的顺序螺旋收缩填充。`;
        document.getElementById('logs').innerHTML = `<div>> 矩阵重置为 ${n}x${n}</div>`;
    }

    function renderMatrix() {
        const container = document.getElementById('matrix-container');
        container.style.gridTemplateColumns = `repeat(${n}, minmax(0, 1fr))`;
        
        // 设置容器大小，保持正方形
        const size = Math.min(window.innerWidth * 0.8, 280);
        container.style.width = `${size}px`;
        container.style.height = `${size}px`;

        container.innerHTML = '';
        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.id = `cell-${r}-${c}`;
                cell.className = `cell-fill border bg-white rounded flex items-center justify-center font-mono font-bold text-sm text-slate-300`;
                cell.innerText = matrix[r][c] || '';
                if (matrix[r][c] !== 0) {
                    cell.classList.add('cell-completed');
                    cell.classList.remove('text-slate-300');
                }
                container.appendChild(cell);
            }
        }
    }

    function nextStep() {
        if (num > n * n) return;

        // 核心逻辑演示：根据方向填充
        if (direction === 'right') {
            fillRight();
        } else if (direction === 'down') {
            fillDown();
        } else if (direction === 'left') {
            fillLeft();
        } else if (direction === 'up') {
            fillUp();
        }

        updateStatus();
    }

    function fillRight() {
        log(`从左往右填充第 ${topBound} 行...`);
        document.getElementById('logic-title').innerText = "向右填充";
        document.getElementById('logic-text').innerText = `沿着上边界 (top=${topBound})，从列 ${leftBound} 填充到 ${rightBound}。`;
        
        for (let k = leftBound; k <= rightBound; k++) {
            matrix[topBound][k] = num++;
            highlightCell(topBound, k);
        }
        topBound++;
        direction = 'down';
    }

    function fillDown() {
        log(`从上往下填充第 ${rightBound} 列...`);
        document.getElementById('logic-title').innerText = "向下填充";
        document.getElementById('logic-text').innerText = `沿着右边界 (right=${rightBound})，从行 ${topBound} 填充到 ${bottomBound}。`;

        for (let k = topBound; k <= bottomBound; k++) {
            matrix[k][rightBound] = num++;
            highlightCell(k, rightBound);
        }
        rightBound--;
        direction = 'left';
    }

    function fillLeft() {
        log(`从右往左填充第 ${bottomBound} 行...`);
        document.getElementById('logic-title').innerText = "向左填充";
        document.getElementById('logic-text').innerText = `沿着下边界 (bottom=${bottomBound})，从列 ${rightBound} 填充到 ${leftBound}。`;

        for (let k = rightBound; k >= leftBound; k--) {
            matrix[bottomBound][k] = num++;
            highlightCell(bottomBound, k);
        }
        bottomBound--;
        direction = 'up';
    }

    function fillUp() {
        log(`从下往上填充第 ${leftBound} 列...`);
        document.getElementById('logic-title').innerText = "向上填充";
        document.getElementById('logic-text').innerText = `沿着左边界 (left=${leftBound})，从行 ${bottomBound} 填充到 ${topBound}。`;

        for (let k = bottomBound; k >= topBound; k--) {
            matrix[k][leftBound] = num++;
            highlightCell(k, leftBound);
        }
        leftBound++;
        direction = 'right';
    }

    function highlightCell(r, c) {
        const cell = document.getElementById(`cell-${r}-${c}`);
        cell.classList.add('cell-active');
        cell.innerText = matrix[r][c];
        setTimeout(() => {
            cell.classList.remove('cell-active');
            cell.classList.add('cell-completed');
            cell.classList.remove('text-slate-300');
        }, 300);
    }

    function updateStatus() {
        document.getElementById('current-num').innerText = Math.min(num, n * n);
        document.getElementById('y-bounds').innerText = `${topBound} / ${bottomBound}`;
        document.getElementById('x-bounds').innerText = `${leftBound} / ${rightBound}`;

        if (num > n * n) {
            log("填充完成！", "text-emerald-500 font-bold");
            document.getElementById('btn-next').disabled = true;
            document.getElementById('logic-title').innerText = "填充完毕";
            document.getElementById('logic-text').innerText = "所有空格已按螺旋顺序填满。";
        }
    }

    function log(msg, colorClass = "") {
        const l = document.getElementById('logs');
        const d = document.createElement('div');
        d.className = `mb-0.5 ${colorClass}`;
        d.innerText = `> ${msg}`;
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
    }

    document.getElementById('btn-next').onclick = nextStep;
    document.getElementById('btn-reset').onclick = init;
    
    init();
</script>
</body>
</html>
