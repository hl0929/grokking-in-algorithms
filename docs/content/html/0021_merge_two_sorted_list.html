<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合并两个有序链表可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-line { 
            padding: 2px 8px; 
            border-radius: 4px; 
            transition: all 0.2s ease;
            font-family: 'Fira Code', 'Courier New', monospace;
            white-space: pre;
            color: #475569;
        }
        .active-line { 
            background-color: #dbeafe; 
            color: #1e40af; 
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6 sm:p-12 overflow-y-auto">

<div class="bg-white w-full max-w-6xl h-auto min-h-[650px] rounded-2xl shadow-xl flex flex-col overflow-hidden border border-gray-200">
    <!-- Header -->
    <div class="bg-gray-100 p-4 border-b border-gray-200 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-red-400"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                <div class="w-3 h-3 rounded-full bg-green-400"></div>
            </div>
            <h1 class="text-gray-800 font-bold ml-4">合并两个有序链表算法可视化</h1>
        </div>
        <div class="text-gray-500 text-sm font-medium" id="phase-indicator">阶段: 准备开始</div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        <!-- Code Section -->
        <div class="w-full md:w-1/3 border-b md:border-b-0 md:border-r border-gray-200 p-6 bg-gray-50/50 overflow-y-auto max-h-[300px] md:max-h-full">
            <div class="text-[10px] text-gray-400 mb-4 uppercase tracking-widest font-bold">Python 实现</div>
            <div id="code-block" class="text-sm space-y-1">
<div id="L1" class="code-line">def merge(l1, l2):</div>
<div id="L2" class="code-line">    dummy = ListNode()</div>
<div id="L3" class="code-line">    curr = dummy</div>
<div id="L4" class="code-line">    while l1 and l2:</div>
<div id="L5" class="code-line">        if l1.val < l2.val:</div>
<div id="L6" class="code-line">            curr.next = l1</div>
<div id="L7" class="code-line">            l1 = l1.next</div>
<div id="L8" class="code-line">        else:</div>
<div id="L9" class="code-line">            curr.next = l2</div>
<div id="L10" class="code-line">            l2 = l2.next</div>
<div id="L11" class="code-line">        curr = curr.next</div>
<div id="L12" class="code-line">    curr.next = l1 or l2</div>
<div id="L13" class="code-line">    return dummy.next</div>
            </div>
        </div>

        <!-- Canvas Section -->
        <div class="flex-1 flex flex-col p-6 min-h-[450px]">
            <div id="canvas-container" class="flex-1 relative bg-white rounded-xl border border-gray-100 shadow-inner">
                <canvas id="mainCanvas"></canvas>
            </div>
            
            <!-- Controls -->
            <div class="mt-6 flex flex-col gap-4 shrink-0">
                <div id="explanation" class="text-blue-700 text-sm bg-blue-50 p-4 rounded-xl border border-blue-100 min-h-[60px]">
                    欢迎！点击“下一步”开始合并链表 l1:[1,2,4] 和 l2:[1,3,4]。
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex gap-3">
                        <button id="prevBtn" class="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 disabled:opacity-40 transition-all font-semibold shadow-sm">上一步</button>
                        <button id="nextBtn" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-40 transition-all font-semibold shadow-md">下一步</button>
                    </div>
                    <button id="resetBtn" class="text-gray-400 hover:text-gray-600 font-medium text-sm transition-colors">重置演示</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    const l1_vals = [1, 2, 4];
    const l2_vals = [1, 3, 4];
    let currentStepIndex = 0;

    // 状态定义：记录 l1, l2 指针位置，新链表已接纳的节点索引
    const steps = [
        { lines: [2, 3], phase: "初始化", l1: 0, l2: 0, curr: -1, merged: [], desc: "创建 dummy 节点和 curr 指针。准备开始比较。" },
        { lines: [4, 5, 8, 9, 10], phase: "比较合并", l1: 0, l2: 1, curr: 0, merged: ['l2_0'], desc: "l1(1) 不小于 l2(1)，将 curr.next 指向 l2 的第一个节点。l2 后移。" },
        { lines: [11, 4, 5, 6, 7], phase: "比较合并", l1: 1, l2: 1, curr: 1, merged: ['l2_0', 'l1_0'], desc: "比较 l1(1) 和 l2(3)。l1(1) 较小，将其接入新链表。l1 后移。" },
        { lines: [11, 4, 5, 6, 7], phase: "比较合并", l1: 2, l2: 1, curr: 2, merged: ['l2_0', 'l1_0', 'l1_1'], desc: "比较 l1(2) 和 l2(3)。l1(2) 较小，接入新链表。l1 后移。" },
        { lines: [11, 4, 5, 8, 9, 10], phase: "比较合并", l1: 2, l2: 2, curr: 3, merged: ['l2_0', 'l1_0', 'l1_1', 'l2_1'], desc: "比较 l1(4) 和 l2(3)。l2(3) 较小，接入新链表。l2 后移。" },
        { lines: [11, 4, 5, 6, 7], phase: "比较合并", l1: 3, l2: 2, curr: 4, merged: ['l2_0', 'l1_0', 'l1_1', 'l2_1', 'l1_2'], desc: "比较 l1(4) 和 l2(4)。l1(4) 不小于 l2(4)，接入 l1 的 4。l1 到达末尾。" },
        { lines: [11, 12], phase: "处理剩余", l1: 3, l2: 2, curr: 5, merged: ['l2_0', 'l1_0', 'l1_1', 'l2_1', 'l1_2', 'l2_2'], desc: "l1 已空。将 curr.next 直接指向 l2 剩余部分。" },
        { lines: [13], phase: "完成", l1: 3, l2: 3, curr: 6, merged: ['l2_0', 'l1_0', 'l1_1', 'l2_1', 'l1_2', 'l2_2'], desc: "合并完成！返回 dummy.next 即可获得排序后的完整链表。" }
    ];

    function resize() {
        const container = document.getElementById('canvas-container');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        render();
    }

    function drawArrow(x1, y1, x2, y2, color = '#cbd5e1', width = 2) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.save();
        ctx.translate(x2, y2);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-8, -4);
        ctx.lineTo(-8, 4);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const step = steps[currentStepIndex];
        
        document.getElementById('phase-indicator').innerText = `阶段: ${step.phase}`;
        document.getElementById('explanation').innerText = step.desc;
        
        document.querySelectorAll('.code-line').forEach(l => l.classList.remove('active-line'));
        step.lines.forEach(lineNum => {
            const line = document.getElementById(`L${lineNum}`);
            if(line) line.classList.add('active-line');
        });

        const startX = 60;
        const nodeGap = (canvas.width - 120) / 5;
        const row1Y = 80;
        const row2Y = 180;
        const row3Y = 320;

        // 绘制 l1 链表
        ctx.fillStyle = "#94a3b8";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText("l1", startX - 30, row1Y);
        l1_vals.forEach((val, i) => {
            const x = startX + i * nodeGap;
            drawNode(x, row1Y, val, '#3b82f6', step.l1 === i ? 'l1' : null);
            if (i < l1_vals.length - 1) drawArrow(x + 25, row1Y, x + nodeGap - 25, row1Y);
        });

        // 绘制 l2 链表
        ctx.fillStyle = "#94a3b8";
        ctx.fillText("l2", startX - 30, row2Y);
        l2_vals.forEach((val, i) => {
            const x = startX + i * nodeGap;
            drawNode(x, row2Y, val, '#8b5cf6', step.l2 === i ? 'l2' : null);
            if (i < l2_vals.length - 1) drawArrow(x + 25, row2Y, x + nodeGap - 25, row2Y);
        });

        // 绘制新链表 (Merged)
        ctx.fillStyle = "#94a3b8";
        ctx.fillText("新链表", startX - 30, row3Y - 40);
        
        // Dummy 节点
        drawNode(startX, row3Y, "D", "#64748b", step.curr === -1 ? 'curr' : 'dummy');

        step.merged.forEach((id, i) => {
            const x = startX + (i + 1) * nodeGap;
            const val = id.startsWith('l1') ? l1_vals[id.split('_')[1]] : l2_vals[id.split('_')[1]];
            const color = id.startsWith('l1') ? '#3b82f6' : '#8b5cf6';
            drawNode(x, row3Y, val, color, step.curr === i ? 'curr' : null);
            
            // 绘制逻辑连接箭头 (从上排指向合并排，仅作演示)
            // 这里简单绘制合并排内部的连接
            drawArrow(startX + i * nodeGap + 25, row3Y, x - 25, row3Y, '#10b981', 3);
        });

        // 最后的剩余部分连接演示
        if(currentStepIndex >= 6 && step.l2 < 3) {
             drawArrow(startX + 5 * nodeGap + 25, row3Y, startX + 2 * nodeGap + 10, row2Y + 20, '#10b981', 2);
        }

        document.getElementById('prevBtn').disabled = currentStepIndex === 0;
        document.getElementById('nextBtn').disabled = currentStepIndex === steps.length - 1;
    }

    function drawNode(x, y, val, color, label) {
        ctx.beginPath();
        ctx.arc(x, y, 22, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 5;
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(val, x, y);

        if (label) {
            ctx.fillStyle = (label === 'curr') ? '#f59e0b' : color;
            ctx.font = 'bold 12px monospace';
            const offset = label === 'curr' ? 40 : -35;
            ctx.fillText(label, x, y + offset);
            
            // 指针线
            ctx.beginPath();
            ctx.moveTo(x, y + (offset > 0 ? 25 : -25));
            ctx.lineTo(x, y + (offset > 0 ? 32 : -28));
            ctx.strokeStyle = ctx.fillStyle;
            ctx.stroke();
        }
    }

    document.getElementById('nextBtn').onclick = () => { if (currentStepIndex < steps.length - 1) { currentStepIndex++; render(); } };
    document.getElementById('prevBtn').onclick = () => { if (currentStepIndex > 0) { currentStepIndex--; render(); } };
    document.getElementById('resetBtn').onclick = () => { currentStepIndex = 0; render(); };

    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
