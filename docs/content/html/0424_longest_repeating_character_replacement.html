<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑动窗口：最长重复字符替换</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --window-bg: rgba(99, 102, 241, 0.15);
            --window-border: #6366f1;
            --text-main: #1e293b;
            --accent: #f59e0b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }

        /* 字符串展示 */
        .string-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 4rem 0;
            position: relative;
            padding: 10px;
        }

        .char-box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .char-box.highlight {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 滑动窗口遮罩 */
        #window-overlay {
            position: absolute;
            height: 80px;
            top: -10px;
            background: var(--window-bg);
            border: 2px solid var(--window-border);
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            display: none;
        }

        /* 状态卡片 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; text-transform: uppercase; }
        .stat-value { font-family: monospace; font-weight: bold; font-size: 1.2rem; color: var(--text-main); }
        .stat-value.important { color: var(--accent); }

        .info-panel {
            background: #f1f5f9;
            padding: 1.2rem;
            border-radius: 1rem;
            border-left: 5px solid var(--primary);
            min-height: 80px;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* 字母计数器 */
        .counts-view {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
        }
        .count-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .count-char { font-weight: bold; font-size: 1.1rem; }
        .count-num { color: var(--primary); font-family: monospace; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-main {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }
        .btn-main:hover { transform: scale(1.05); }
        .btn-sub { background: none; border: none; cursor: pointer; color: #64748b; }
        .btn-sub:hover { color: var(--primary); }

        svg { width: 28px; height: 28px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <h1>Longest Repeating Character Replacement</h1>
    <div class="subtitle" id="dynamic-subtitle">滑动窗口演示：s = "AABABBA", k = 1</div>

    <div class="dashboard">
        <div class="stat-card"><div class="stat-label">Left</div><div class="stat-value" id="val-left">0</div></div>
        <div class="stat-card"><div class="stat-label">Right</div><div class="stat-value" id="val-right">0</div></div>
        <div class="stat-card"><div class="stat-label">Max Count</div><div class="stat-value important" id="val-max-cnt">0</div></div>
        <div class="stat-card"><div class="stat-label">Max Length</div><div class="stat-value important" id="val-max-len">0</div></div>
    </div>

    <div class="counts-view" id="counts-container">
        <!-- JS 注入 -->
    </div>

    <div class="string-display" id="string-container">
        <div id="window-overlay"></div>
        <!-- JS 注入字符 -->
    </div>

    <div class="info-panel" id="log">
        准备就绪。点击播放按钮观察窗口如何扩展和滑动。
    </div>

    <div class="controls">
        <button class="btn-sub" id="reset-btn" title="重置">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button class="btn-main" id="play-btn">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn-sub" id="next-btn" title="下一步">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
    </div>
</div>

<script>
    const s = "AABABBA";
    const k = 1;
    let steps = [];
    let currentStep = -1;
    let isPlaying = false;
    let timer = null;

    function generateSteps() {
        let res = [];
        let repeat_map = {};
        let max_len = 0;
        let max_cnt = 0;
        let left = 0;
        const chars = s.split('');

        for (let right = 0; right < chars.length; right++) {
            const char = chars[right];
            repeat_map[char] = (repeat_map[char] || 0) + 1;
            max_cnt = Math.max(max_cnt, repeat_map[char]);
            
            res.push({
                left, right, max_cnt, max_len, 
                map: {...repeat_map}, 
                action: `右指针移到 <b>'${char}'</b> (索引 ${right})。当前主导字符最大频率 <b>${max_cnt}</b>。`
            });

            // 窗口宽度 - 主导字符数量 > k
            const current_width = right - left + 1;
            if (current_width - max_cnt > k) {
                const leftChar = chars[left];
                repeat_map[leftChar] -= 1;
                left += 1;
                res.push({
                    left, right, max_cnt, max_len, 
                    map: {...repeat_map}, 
                    action: `需要替换的字符 (${current_width - max_cnt}) > k(${k})。<b>左指针右移</b>，滑动窗口保持规模。`
                });
            }

            max_len = Math.max(max_len, (right - left + 1));
            res.push({
                left, right, max_cnt, max_len, 
                map: {...repeat_map}, 
                action: `记录当前最优解长度: <b>${max_len}</b>。`
            });
        }
        return res;
    }

    steps = generateSteps();

    // 初始化 UI
    const stringContainer = document.getElementById('string-container');
    const overlay = document.getElementById('window-overlay');
    s.split('').forEach((char, i) => {
        const box = document.createElement('div');
        box.className = 'char-box';
        box.id = `char-${i}`;
        box.innerText = char;
        stringContainer.appendChild(box);
    });

    function updateUI() {
        if (currentStep < 0) return;
        const s_step = steps[currentStep];

        // 状态更新
        document.getElementById('val-left').innerText = s_step.left;
        document.getElementById('val-right').innerText = s_step.right;
        document.getElementById('val-max-cnt').innerText = s_step.max_cnt;
        document.getElementById('val-max-len').innerText = s_step.max_len;
        document.getElementById('log').innerHTML = s_step.action;

        // 计数器更新
        const countsContainer = document.getElementById('counts-container');
        countsContainer.innerHTML = '';
        Object.entries(s_step.map).forEach(([char, count]) => {
            if (count === 0) return;
            const item = document.createElement('div');
            item.className = 'count-item';
            item.innerHTML = `<span class="count-char">${char}</span><span class="count-num">${count}</span>`;
            countsContainer.appendChild(item);
        });

        // 窗口位置更新
        overlay.style.display = 'block';
        const leftBox = document.getElementById(`char-${s_step.left}`);
        const rightBox = document.getElementById(`char-${s_step.right}`);
        
        const startX = leftBox.offsetLeft - 5;
        const endX = rightBox.offsetLeft + rightBox.offsetWidth + 5;
        overlay.style.left = `${startX}px`;
        overlay.style.width = `${endX - startX}px`;

        // 字符高亮
        document.querySelectorAll('.char-box').forEach((box, i) => {
            box.classList.toggle('highlight', i >= s_step.left && i <= s_step.right);
        });
    }

    function next() {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateUI();
        } else {
            stop();
        }
    }

    function stop() {
        isPlaying = false;
        clearInterval(timer);
        document.getElementById('play-icon').style.display = 'block';
        document.getElementById('pause-icon').style.display = 'none';
    }

    document.getElementById('play-btn').onclick = () => {
        if (isPlaying) {
            stop();
        } else {
            if (currentStep >= steps.length - 1) currentStep = -1;
            isPlaying = true;
            document.getElementById('play-icon').style.display = 'none';
            document.getElementById('pause-icon').style.display = 'block';
            timer = setInterval(next, 1200);
        }
    };

    document.getElementById('next-btn').onclick = () => { stop(); next(); };
    document.getElementById('reset-btn').onclick = () => {
        stop();
        currentStep = -1;
        overlay.style.display = 'none';
        document.querySelectorAll('.char-box').forEach(b => b.classList.remove('highlight'));
        document.getElementById('log').innerText = "已重置。";
    };

</script>
</body>
</html>
