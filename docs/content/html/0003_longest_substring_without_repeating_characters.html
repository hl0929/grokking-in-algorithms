<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑动窗口：无重复字符的最长子串</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --window-bg: rgba(99, 102, 241, 0.1);
            --window-border: #6366f1;
            --text-main: #1e293b;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }

        /* 字符串展示 */
        .string-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 4rem 0;
            position: relative;
            padding: 10px;
        }

        .char-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.25rem;
            font-weight: bold;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .char-box.in-window {
            border-color: var(--primary);
            color: var(--primary);
            background: #eef2ff;
        }

        .char-box.conflict {
            background: #fee2e2;
            border-color: var(--danger);
            color: var(--danger);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 窗口遮罩 */
        #window-overlay {
            position: absolute;
            height: 70px;
            top: 0px;
            background: var(--window-bg);
            border: 2px solid var(--window-border);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            display: none;
        }

        /* 状态展示 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; text-transform: uppercase; }
        .stat-value { font-family: monospace; font-weight: bold; font-size: 1.2rem; }

        .set-view {
            background: #f1f5f9;
            padding: 1.2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            min-height: 50px;
        }

        .set-label { font-size: 0.85rem; font-weight: bold; margin-bottom: 0.5rem; color: #475569; }
        .set-items { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-token {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .info-panel {
            background: #eef2ff;
            padding: 1rem;
            border-radius: 0.75rem;
            border-left: 5px solid var(--primary);
            min-height: 60px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-main {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-sub { background: none; border: none; cursor: pointer; color: #64748b; }
        .btn-sub:hover { color: var(--primary); }

        svg { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <h1>最长不重复子串可视化</h1>
    <div class="subtitle">输入: "qrsvbspk"</div>

    <div class="dashboard">
        <div class="stat-card"><div class="stat-label">Left 指针</div><div class="stat-value" id="val-left">0</div></div>
        <div class="stat-card"><div class="stat-label">Right 指针</div><div class="stat-value" id="val-right">0</div></div>
        <div class="stat-card"><div class="stat-label">最长长度</div><div class="stat-value" style="color:var(--accent)" id="val-max-len">0</div></div>
    </div>

    <div class="set-view">
        <div class="set-label">Set (当前窗口内的字符):</div>
        <div class="set-items" id="set-container"></div>
    </div>

    <div class="string-display" id="string-container">
        <div id="window-overlay"></div>
    </div>

    <div class="info-panel" id="log">
        点击播放查看窗口如何根据字符重复情况进行滑动。
    </div>

    <div class="controls">
        <button class="btn-sub" id="reset-btn" title="重置">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button class="btn-main" id="play-btn">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn-sub" id="next-btn" title="下一步">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
    </div>
</div>

<script>
    const s = "qrsvbspk";
    let steps = [];
    let currentStep = -1;
    let isPlaying = false;
    let timer = null;

    function generateSteps() {
        let res = [];
        let set = new Set();
        let left = 0;
        let max_len = 0;
        const chars = s.split('');

        for (let right = 0; right < chars.length; right++) {
            const char = chars[right];
            
            while (set.has(char)) {
                res.push({
                    left, right, max_len, set: new Set(set),
                    conflict: right,
                    action: `发现重复字符 <b>'${char}'</b>! 必须移动左指针 <b>left</b> 来移除旧的 '${chars[left]}'.`
                });
                set.delete(chars[left]);
                left++;
            }
            
            set.add(char);
            max_len = Math.max(max_len, right - left + 1);
            res.push({
                left, right, max_len, set: new Set(set),
                action: `将 <b>'${char}'</b> 加入窗口。当前不重复长度为 ${right - left + 1}.`
            });
        }
        return res;
    }

    steps = generateSteps();

    // 初始化 UI
    const stringContainer = document.getElementById('string-container');
    const overlay = document.getElementById('window-overlay');
    s.split('').forEach((char, i) => {
        const box = document.createElement('div');
        box.className = 'char-box';
        box.id = `char-${i}`;
        box.innerText = char;
        stringContainer.appendChild(box);
    });

    function updateUI() {
        if (currentStep < 0) return;
        const step = steps[currentStep];

        document.getElementById('val-left').innerText = step.left;
        document.getElementById('val-right').innerText = step.right;
        document.getElementById('val-max-len').innerText = step.max_len;
        document.getElementById('log').innerHTML = step.action;

        // 更新 Set 显示
        const setContainer = document.getElementById('set-container');
        setContainer.innerHTML = '';
        step.set.forEach(c => {
            const token = document.createElement('span');
            token.className = 'set-token';
            token.innerText = c;
            setContainer.appendChild(token);
        });

        // 更新窗口和高亮
        overlay.style.display = 'block';
        const leftBox = document.getElementById(`char-${step.left}`);
        const rightBox = document.getElementById(`char-${step.right}`);
        
        overlay.style.left = (leftBox.offsetLeft - 5) + 'px';
        overlay.style.width = (rightBox.offsetLeft - leftBox.offsetLeft + rightBox.offsetWidth + 10) + 'px';

        document.querySelectorAll('.char-box').forEach((box, i) => {
            box.className = 'char-box';
            if (i >= step.left && i <= step.right) box.classList.add('in-window');
            if (step.conflict === i) box.classList.add('conflict');
        });
    }

    function next() {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateUI();
        } else {
            stop();
        }
    }

    function stop() {
        isPlaying = false;
        clearInterval(timer);
        document.getElementById('play-icon').style.display = 'block';
        document.getElementById('pause-icon').style.display = 'none';
    }

    document.getElementById('play-btn').onclick = () => {
        if (isPlaying) {
            stop();
        } else {
            if (currentStep >= steps.length - 1) currentStep = -1;
            isPlaying = true;
            document.getElementById('play-icon').style.display = 'none';
            document.getElementById('pause-icon').style.display = 'block';
            timer = setInterval(next, 1000);
        }
    };

    document.getElementById('next-btn').onclick = () => { stop(); next(); };
    document.getElementById('reset-btn').onclick = () => {
        stop();
        currentStep = -1;
        overlay.style.display = 'none';
        document.querySelectorAll('.char-box').forEach(b => b.className = 'char-box');
        document.getElementById('log').innerText = "已重置。";
        document.getElementById('set-container').innerHTML = '';
    };

</script>
</body>
</html>
