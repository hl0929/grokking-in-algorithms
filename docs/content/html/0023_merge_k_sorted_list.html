<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge K Lists Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        .code-container {
            background-color: #0f172a;
            color: #94a3b8;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            line-height: 1.3;
        }
        .code-line {
            display: block;
            padding: 1px 10px;
            border-left: 2px solid transparent;
            white-space: pre;
        }
        .code-line.active {
            background-color: #1e293b;
            color: #38bdf8;
            border-left-color: #38bdf8;
        }
        .node { transition: all 0.3s ease; }
        .heap-item { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .list-row { border-bottom: 1px dashed #e2e8f0; }
        .list-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-2">

    <div class="w-full max-w-4xl bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col h-[520px]">
        
        <!-- Header -->
        <div class="bg-white border-b border-slate-100 px-4 py-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center text-white shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                </div>
                <h1 class="text-slate-800 font-bold text-xs">Merge K Sorted Lists</h1>
            </div>
            <div class="flex items-center gap-2 scale-90">
                <button id="btn-reset" class="text-[10px] font-bold text-slate-400 hover:text-slate-600 px-2">RESET</button>
                <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-lg">
                    <button id="btn-prev" class="p-1 hover:bg-white rounded"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
                    <button id="btn-play" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold hover:bg-blue-700 min-w-[60px]">START</button>
                    <button id="btn-next" class="p-1 hover:bg-white rounded"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                </div>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <!-- Main Viz Area -->
            <div class="flex-1 p-3 flex flex-col gap-3 bg-slate-50/50 overflow-y-auto">
                
                <!-- Input Lists -->
                <div class="bg-white p-2 rounded-lg border border-slate-200 shadow-sm">
                    <div class="text-[9px] font-bold text-slate-400 uppercase mb-2">Input Lists (K=3)</div>
                    <div id="input-lists" class="space-y-2">
                        <!-- List rows generated here -->
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <!-- Min-Heap Viz -->
                    <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 shadow-inner">
                        <div class="text-[9px] font-bold text-slate-500 uppercase mb-2">Min-Heap (heapq)</div>
                        <div id="heap-container" class="flex flex-wrap gap-1 content-start h-20">
                            <!-- Heap items -->
                        </div>
                    </div>

                    <!-- Result List -->
                    <div class="bg-white p-2 rounded-lg border border-slate-200 shadow-sm overflow-hidden">
                        <div class="text-[9px] font-bold text-slate-400 uppercase mb-2">Merged Result</div>
                        <div id="result-list" class="flex items-center gap-1 h-20 overflow-x-auto">
                            <!-- Result nodes -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Code Panel -->
            <div class="w-[260px] code-container flex flex-col border-l border-slate-200">
                <div class="px-3 py-2 bg-slate-950 flex justify-between items-center">
                    <span class="text-[9px] font-bold text-slate-500 tracking-tighter uppercase">Algorithm</span>
                    <span id="step-info" class="text-[9px] text-blue-400 font-mono">STEP 0</span>
                </div>
                <div class="flex-1 py-2">
                    <code id="L1" class="code-line">heap = []</code>
                    <code id="L2" class="code-line">for node in lists:</code>
                    <code id="L3" class="code-line">  while node:</code>
                    <code id="L4" class="code-line">    heappush(heap, node.val)</code>
                    <code id="L5" class="code-line">    node = node.next</code>
                    <code id="L6" class="code-line">head = curr = ListNode()</code>
                    <code id="L7" class="code-line">while heap:</code>
                    <code id="L8" class="code-line">  val = heappop(heap)</code>
                    <code id="L9" class="code-line">  curr.next = ListNode(val)</code>
                    <code id="L10" class="code-line">  curr = curr.next</code>
                </div>
                <div id="log" class="p-3 bg-slate-950 text-[10px] text-slate-400 border-t border-slate-800 min-h-[100px]">
                    准备就绪，点击开始。
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputListsData = [
            [1, 4, 5],
            [1, 3, 4],
            [2, 6]
        ];

        let steps = [];
        let currentStep = 0;
        let timer = null;

        function generateSteps() {
            let heap = [];
            let result = [];
            
            steps.push({ line: 'L1', heap: [], res: [], msg: "初始化空堆。", activeList: -1, activeIdx: -1 });

            // PHASE 1: Build Heap
            for (let i = 0; i < inputListsData.length; i++) {
                steps.push({ line: 'L2', heap: [...heap], res: [], msg: `遍历第 ${i+1} 条链表。`, activeList: i, activeIdx: -1 });
                for (let j = 0; j < inputListsData[i].length; j++) {
                    const val = inputListsData[i][j];
                    heap.push(val);
                    heap.sort((a,b) => a - b);
                    steps.push({ line: 'L4', heap: [...heap], res: [], msg: `将值 ${val} 放入堆中并重新排序。`, activeList: i, activeIdx: j });
                }
            }

            steps.push({ line: 'L6', heap: [...heap], res: [], msg: "创建哑节点，准备弹出堆数据。", activeList: -1, activeIdx: -1 });

            // PHASE 2: Pop from Heap
            while (heap.length > 0) {
                const val = heap.shift();
                steps.push({ line: 'L8', heap: [...heap], res: [...result], msg: `从堆顶弹出最小值 ${val}。`, activeList: -1, activeIdx: -1 });
                result.push(val);
                steps.push({ line: 'L10', heap: [...heap], res: [...result], msg: `将 ${val} 接到结果链表末尾。`, activeList: -1, activeIdx: -1 });
            }
        }

        function renderStatic() {
            const listContainer = document.getElementById('input-lists');
            inputListsData.forEach((list, lIdx) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-1 py-1 list-row";
                row.innerHTML = `<span class="text-[9px] w-4 text-slate-400 font-mono">L${lIdx}:</span>`;
                list.forEach((val, vIdx) => {
                    row.innerHTML += `
                        <div id="in-${lIdx}-${vIdx}" class="w-6 h-6 rounded border border-slate-200 bg-white flex items-center justify-center text-[10px] font-bold text-slate-600 transition-all">
                            ${val}
                        </div>
                        ${vIdx < list.length - 1 ? '<span class="text-slate-300 text-[8px]">→</span>' : ''}
                    `;
                });
                listContainer.appendChild(row);
            });
        }

        function update() {
            const step = steps[currentStep];
            
            // Update Code
            document.querySelectorAll('.code-line').forEach(l => l.classList.remove('active'));
            document.getElementById(step.line).classList.add('active');
            
            // Update Log & Step
            document.getElementById('log').innerText = step.msg;
            document.getElementById('step-info').innerText = `STEP ${currentStep}`;

            // Update Input Highlight
            document.querySelectorAll('[id^="in-"]').forEach(el => el.className = el.className.replace(/bg-\w+-100|border-\w+-400/g, 'bg-white border-slate-200'));
            if (step.activeList !== -1 && step.activeIdx !== -1) {
                const el = document.getElementById(`in-${step.activeList}-${step.activeIdx}`);
                el.className = "w-6 h-6 rounded border-2 border-blue-400 bg-blue-50 flex items-center justify-center text-[10px] font-black text-blue-700 transition-all scale-110 shadow-sm";
            }

            // Update Heap
            const heapCont = document.getElementById('heap-container');
            heapCont.innerHTML = '';
            step.heap.forEach((val, i) => {
                const item = document.createElement('div');
                item.className = "heap-item w-5 h-5 bg-slate-700 text-slate-200 rounded text-[9px] flex items-center justify-center font-bold border border-slate-600";
                item.innerText = val;
                heapCont.appendChild(item);
            });

            // Update Result
            const resCont = document.getElementById('result-list');
            resCont.innerHTML = '';
            step.res.forEach((val, i) => {
                const node = document.createElement('div');
                node.className = "flex items-center gap-1 shrink-0";
                node.innerHTML = `
                    <div class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[10px] font-bold shadow-sm animate-in zoom-in duration-300">
                        ${val}
                    </div>
                    ${i < step.res.length - 1 ? '<span class="text-slate-300">→</span>' : ''}
                `;
                resCont.appendChild(node);
                if (i === step.res.length - 1) node.scrollIntoView({behavior:'smooth', inline:'end'});
            });
        }

        renderStatic();
        generateSteps();
        update();

        document.getElementById('btn-next').onclick = () => { if(currentStep < steps.length-1) { currentStep++; update(); }};
        document.getElementById('btn-prev').onclick = () => { if(currentStep > 0) { currentStep--; update(); }};
        document.getElementById('btn-reset').onclick = () => { currentStep = 0; update(); if(timer){clearInterval(timer); timer=null; document.getElementById('btn-play').innerText="START";}};
        
        document.getElementById('btn-play').onclick = function() {
            if (timer) {
                clearInterval(timer);
                timer = null;
                this.innerText = "RESUME";
            } else {
                this.innerText = "PAUSE";
                timer = setInterval(() => {
                    if (currentStep < steps.length - 1) {
                        currentStep++;
                        update();
                    } else {
                        clearInterval(timer);
                        timer = null;
                        this.innerText = "RESTART";
                    }
                }, 400);
            }
        };
    </script>
</body>
</html>
