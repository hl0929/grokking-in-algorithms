<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合并区间算法可视化</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --interval-bg: rgba(99, 102, 241, 0.2);
            --interval-border: #6366f1;
            --merged-bg: rgba(16, 185, 129, 0.2);
            --merged-border: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }

        /* 数轴样式 */
        .timeline-container {
            position: relative;
            margin: 4rem 0;
            height: 200px;
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 20px;
            overflow: hidden;
        }

        .axis {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #cbd5e1;
        }

        .axis-tick {
            position: absolute;
            bottom: -25px;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* 区间块样式 */
        .interval-block {
            position: absolute;
            height: 35px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid;
            box-sizing: border-box;
        }

        .pending {
            background: var(--interval-bg);
            border-color: var(--interval-border);
            color: var(--primary);
            opacity: 0.6;
        }

        .active {
            background: #fffbeb;
            border-color: #f59e0b;
            color: #d97706;
            z-index: 10;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        .merged {
            background: var(--merged-bg);
            border-color: var(--merged-border);
            color: #047857;
        }

        /* 状态与控制 */
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-box {
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .log-panel {
            background: #eef2ff;
            border-left: 5px solid var(--primary);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            min-height: 80px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .list-view {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .tag {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>合并区间算法可视化</h1>
    <div class="subtitle">输入: [[1, 3], [2, 6], [8, 10], [15, 18]]</div>

    <div class="status-panel">
        <div class="info-box">
            <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px;">结果集 (Results)</div>
            <div class="list-view" id="result-list"></div>
        </div>
        <div class="log-panel" id="log">
            点击“开始”按钮演示合并过程。首先我们会对区间按起点进行排序。
        </div>
    </div>

    <div class="timeline-container" id="timeline">
        <div class="axis" id="axis"></div>
        <!-- 区间将动态插入这里 -->
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="reset()">重置</button>
        <button class="btn btn-primary" id="play-btn" onclick="nextStep()">下一步</button>
    </div>
</div>

<script>
    const originalIntervals = [[1, 3], [2, 6], [8, 10], [15, 18]];
    let intervals = [...originalIntervals].sort((a, b) => a[0] - b[0]);
    let merged = [];
    let currentStep = -1;
    const scale = 40; // 像素缩放比例

    function initTimeline() {
        const timeline = document.getElementById('timeline');
        const axis = document.getElementById('axis');
        
        // 创建刻度
        for (let i = 0; i <= 20; i++) {
            const tick = document.createElement('div');
            tick.className = 'axis-tick';
            tick.style.left = (i * scale) + 'px';
            tick.innerText = i;
            axis.appendChild(tick);
        }

        // 创建初始区间块
        intervals.forEach((interval, index) => {
            const block = document.createElement('div');
            block.className = 'interval-block pending';
            block.id = `block-${index}`;
            block.style.left = (interval[0] * scale + 20) + 'px';
            block.style.width = ((interval[1] - interval[0]) * scale) + 'px';
            block.style.bottom = (80 + index * 25) + 'px';
            block.innerText = `[${interval[0]}, ${interval[1]}]`;
            timeline.appendChild(block);
        });
    }

    function updateResultUI() {
        const list = document.getElementById('result-list');
        list.innerHTML = merged.map(it => `<span class="tag">[${it[0]}, ${it[1]}]</span>`).join('');
    }

    function nextStep() {
        currentStep++;
        const log = document.getElementById('log');

        if (currentStep === 0) {
            // 处理第一个区间
            const first = intervals[0];
            merged.push([...first]);
            const block = document.getElementById('block-0');
            block.className = 'interval-block merged active';
            block.style.bottom = '40px';
            log.innerHTML = `<b>初始化：</b>将第一个区间 <b>[${first[0]}, ${first[1]}]</b> 加入结果集。`;
            updateResultUI();
            return;
        }

        if (currentStep >= intervals.length) {
            log.innerHTML = `<b>完成：</b>所有区间处理完毕。最终合并结果如上图。`;
            document.getElementById('play-btn').disabled = true;
            return;
        }

        const current = intervals[currentStep];
        const lastMerged = merged[merged.length - 1];
        const currentBlock = document.getElementById(`block-${currentStep}`);
        
        // 视觉上将当前块降下来对比
        currentBlock.classList.add('active');
        currentBlock.style.bottom = '55px';

        if (lastMerged[1] >= current[0]) {
            // 发生重叠
            const oldEnd = lastMerged[1];
            lastMerged[1] = Math.max(lastMerged[1], current[1]);
            
            log.innerHTML = `<b>发现重叠！</b><br>当前区间起点 ${current[0]} ≤ 结果集最后一个终点 ${oldEnd}。<br>更新终点为 <b>max(${oldEnd}, ${current[1]}) = ${lastMerged[1]}</b>。`;
            
            // 动画：合并效果
            setTimeout(() => {
                const resultBlocks = document.querySelectorAll('.merged');
                const lastResultBlock = resultBlocks[resultBlocks.length - 1];
                lastResultBlock.style.width = ((lastMerged[1] - lastMerged[0]) * scale) + 'px';
                lastResultBlock.innerText = `[${lastMerged[0]}, ${lastMerged[1]}]`;
                currentBlock.style.opacity = '0';
                setTimeout(() => currentBlock.remove(), 500);
                updateResultUI();
            }, 600);

        } else {
            // 不重叠
            log.innerHTML = `<b>不重叠：</b>起点 ${current[0]} > 结果集最后一个终点 ${lastMerged[1]}。<br>将其作为一个<b>新区间</b>存入。`;
            
            setTimeout(() => {
                merged.push([...current]);
                currentBlock.className = 'interval-block merged';
                currentBlock.style.bottom = '40px';
                updateResultUI();
            }, 600);
        }
    }

    function reset() {
        location.reload();
    }

    window.onload = initTimeline;
</script>
</body>
</html>
