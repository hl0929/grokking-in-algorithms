<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top K Frequent Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-card { transition: all 0.4s ease; border: 1px solid #f1f5f9; }
        .step-active { border-color: #f59e0b; background-color: #fffbeb; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .item-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        .bucket-cell { min-height: 40px; transition: all 0.3s ease; }
        .highlight-freq { background-color: #f59e0b; color: white; transform: scale(1.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-4 font-sans text-slate-800">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <!-- 头部 -->
        <div class="px-4 py-2 border-b border-slate-100 flex justify-between items-center bg-white">
            <div>
                <h1 class="text-sm font-bold text-slate-800">347. 前 K 个高频元素</h1>
                <p class="text-[10px] text-slate-400">算法：桶排序 (Bucket Sort) | 时间 $O(n)$</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-reset" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-gray-600 rounded text-xs font-semibold transition">重置</button>
                <button id="btn-next" class="px-4 py-1 bg-indigo-500 hover:bg-indigo-600 text-white rounded text-xs font-semibold shadow-sm transition">下一步</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 h-[500px]">
            <!-- 左侧：主要流程可视化 -->
            <div class="md:col-span-8 p-4 bg-slate-50 overflow-y-auto flex flex-col gap-4">
                
                <!-- Step 1: Input & Map -->
                <div id="step-1-ui" class="step-card p-3 rounded-xl bg-white">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block mb-2">1. 频率统计 (freq_dict)</span>
                    <div id="freq-map" class="flex flex-wrap gap-2">
                        <!-- Hash Map items here -->
                        <div class="text-[10px] text-slate-300 italic italic">等待输入...</div>
                    </div>
                </div>

                <!-- Step 2: Buckets -->
                <div id="step-2-ui" class="step-card p-3 rounded-xl bg-white">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block mb-2">2. 频率分桶 (buckets)</span>
                    <div id="bucket-container" class="grid grid-cols-7 gap-1">
                        <!-- Buckets generated by JS -->
                    </div>
                    <div class="mt-2 text-[8px] text-slate-400 text-center">桶下标 = 出现次数</div>
                </div>

                <!-- Step 3: Result -->
                <div id="step-3-ui" class="step-card p-3 rounded-xl bg-white">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block mb-2">3. 提取前 K 个 (res)</span>
                    <div id="result-list" class="flex gap-2 min-h-[32px] items-center">
                        <!-- Final Result items -->
                    </div>
                </div>
            </div>

            <!-- 右侧：控制台与源码 -->
            <div class="md:col-span-4 border-l border-slate-100 flex flex-col bg-white">
                <!-- 变量状态 -->
                <div class="p-3 bg-slate-900 text-white shrink-0">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">当前参数</span>
                        <span class="text-[10px] px-1.5 py-0.5 bg-indigo-500 rounded font-mono">k = 2</span>
                    </div>
                    <div id="input-array" class="flex flex-wrap gap-1">
                        <!-- nums representation -->
                    </div>
                </div>

                <!-- 逻辑描述 -->
                <div class="p-3 border-b border-slate-100 bg-indigo-50/30 shrink-0">
                    <div class="flex items-center gap-2 mb-1">
                        <div id="indicator" class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
                        <h3 id="step-title" class="text-[11px] font-bold text-slate-700">就绪</h3>
                    </div>
                    <p id="step-desc" class="text-[10px] text-slate-500 leading-tight">点击“下一步”开始执行算法步骤。</p>
                </div>

                <!-- 日志 -->
                <div id="log-box" class="flex-1 p-3 font-mono text-[10px] text-slate-400 overflow-y-auto">
                    <!-- Logs here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const nums = [1, 1, 1, 2, 2, 3];
        const K = 2;
        
        let freqDict = {};
        let buckets = [];
        let result = [];
        let currentStep = 0; // 0: Counting, 1: Bucketing, 2: Extracting, 3: Done

        function init() {
            freqDict = {};
            buckets = Array.from({length: nums.length + 1}, () => []);
            result = [];
            currentStep = 0;

            // Render Input Array
            const inputContainer = document.getElementById('input-array');
            inputContainer.innerHTML = '';
            nums.forEach(n => {
                const el = document.createElement('span');
                el.className = "w-5 h-5 flex items-center justify-center bg-slate-700 text-[10px] font-bold rounded";
                el.innerText = n;
                inputContainer.appendChild(el);
            });

            // Render Empty Buckets
            const bucketBox = document.getElementById('bucket-container');
            bucketBox.innerHTML = '';
            for(let i=0; i<buckets.length; i++) {
                const b = document.createElement('div');
                b.id = `bucket-${i}`;
                b.className = "bucket-cell border border-slate-100 rounded bg-slate-50 flex flex-col items-center p-1 gap-1";
                b.innerHTML = `<span class="text-[8px] text-slate-300 font-mono">${i}</span>`;
                bucketBox.appendChild(b);
            }

            document.getElementById('freq-map').innerHTML = '<div class="text-[10px] text-slate-300 italic italic">等待统计...</div>';
            document.getElementById('result-list').innerHTML = '';
            document.getElementById('log-box').innerHTML = '';
            document.getElementById('btn-next').disabled = false;
            document.getElementById('btn-next').innerText = "下一步";
            
            updateStepUI();
        }

        function updateStepUI() {
            const cards = [document.getElementById('step-1-ui'), document.getElementById('step-2-ui'), document.getElementById('step-3-ui')];
            cards.forEach((c, i) => {
                if(i === currentStep) c.classList.add('step-active');
                else c.classList.remove('step-active');
            });
        }

        async function nextStep() {
            const btn = document.getElementById('btn-next');
            btn.disabled = true;

            if (currentStep === 0) {
                // Step 0: Count Frequencies
                document.getElementById('step-title').innerText = "1. 统计频率";
                document.getElementById('step-desc').innerText = "遍历数组，使用哈希表统计每个数字出现的次数。";
                document.getElementById('freq-map').innerHTML = '';
                
                for(let num of nums) {
                    freqDict[num] = (freqDict[num] || 0) + 1;
                    renderFreqMap();
                    log(`统计数字 ${num}，当前频率: ${freqDict[num]}`);
                    await sleep(150);
                }
                currentStep = 1;
            } 
            else if (currentStep === 1) {
                // Step 1: Fill Buckets
                document.getElementById('step-title').innerText = "2. 频率分桶";
                document.getElementById('step-desc').innerText = "将数字放入对应的“频率桶”中。下标 3 的桶存放出现 3 次的数字。";
                
                for(let num in freqDict) {
                    const freq = freqDict[num];
                    buckets[freq].push(num);
                    
                    const bEl = document.getElementById(`bucket-${freq}`);
                    const item = document.createElement('div');
                    item.className = "item-pop w-5 h-5 bg-indigo-500 text-white rounded flex items-center justify-center text-[10px] font-bold shadow-sm";
                    item.innerText = num;
                    bEl.appendChild(item);
                    
                    log(`数字 ${num} 出现了 ${freq} 次 -> 放入桶 ${freq}`);
                    await sleep(300);
                }
                currentStep = 2;
            }
            else if (currentStep === 2) {
                // Step 2: Extract Top K
                document.getElementById('step-title').innerText = "3. 提取结果";
                document.getElementById('step-desc').innerText = "从最大的频率桶开始逆序遍历，直到收集齐 K 个元素。";
                
                let count = 0;
                for(let i = buckets.length - 1; i > 0; i--) {
                    if(buckets[i].length > 0) {
                        const bEl = document.getElementById(`bucket-${i}`);
                        bEl.classList.add('highlight-freq');
                        
                        for(let num of buckets[i]) {
                            result.push(num);
                            renderResult();
                            log(`从桶 ${i} 提取高频元素: ${num}`);
                            count++;
                            await sleep(400);
                            if(result.length >= K) break;
                        }
                    }
                    if(result.length >= K) break;
                    await sleep(200);
                }
                currentStep = 3;
            }

            updateStepUI();
            if(currentStep === 3) {
                document.getElementById('step-title').innerText = "完成";
                document.getElementById('step-desc').innerText = `已找到前 ${K} 个高频元素。`;
                document.getElementById('indicator').classList.replace('bg-indigo-500', 'bg-green-500');
                btn.innerText = "全部完成";
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }

        function renderFreqMap() {
            const container = document.getElementById('freq-map');
            container.innerHTML = '';
            for(let num in freqDict) {
                const item = document.createElement('div');
                item.className = "flex items-center gap-1 bg-slate-100 px-2 py-1 rounded border border-slate-200";
                item.innerHTML = `<span class="font-bold text-slate-700 text-[10px]">${num}</span><span class="text-slate-300 text-[8px]">→</span><span class="text-indigo-600 font-mono text-[10px] font-bold">${freqDict[num]}</span>`;
                container.appendChild(item);
            }
        }

        function renderResult() {
            const container = document.getElementById('result-list');
            container.innerHTML = '';
            result.forEach(n => {
                const item = document.createElement('div');
                item.className = "item-pop w-8 h-8 bg-green-500 text-white rounded-lg flex items-center justify-center font-bold text-sm shadow-md";
                item.innerText = n;
                container.appendChild(item);
            });
        }

        function log(msg) {
            const box = document.getElementById('log-box');
            const d = document.createElement('div');
            d.className = "mb-1 border-l border-slate-200 pl-2";
            d.innerHTML = `<span class="text-slate-300">></span> ${msg}`;
            box.prepend(d);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        document.getElementById('btn-next').onclick = nextStep;
        document.getElementById('btn-reset').onclick = init;
        init();
    </script>
</body>
</html>
